<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章段落双语生成器</title>

    <!-- PDF 导出库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>

        :root {
            --primary-color: #007AFF;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-chinese: #1d1d1f;
        }

        body {

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                "PingFang SC",
                sans-serif;

            background-color: var(--bg-color);

            color: var(--text-chinese);

            line-height: 1.8;

            margin: 0;

            padding: 40px 20px;
        }

        .container {

            max-width: 800px;

            margin: 0 auto;
        }

        h1 {

            text-align: center;

            font-weight: 600;

            margin-bottom: 30px;

            color: #333;
        }

        /* 输入区 */

        .input-card {

            background: var(--card-bg);

            padding: 24px;

            border-radius: 12px;

            box-shadow:
                0 4px 20px rgba(0,0,0,0.05);

            margin-bottom: 30px;
        }

        textarea {

            width: 100%;

            height: 180px;

            padding: 15px;

            border: 1px solid #d2d2d7;

            border-radius: 8px;

            font-size: 16px;

            box-sizing: border-box;

            outline: none;

            transition: border-color 0.3s;

            resize: vertical;
        }

        textarea:focus {

            border-color: var(--primary-color);
        }

        button {

            display: block;

            width: 100%;

            padding: 14px;

            margin-top: 15px;

            background-color: var(--primary-color);

            color: white;

            border: none;

            border-radius: 8px;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            transition: background 0.3s;
        }

        button:hover {

            background-color: #0056b3;
        }

        button:disabled {

            background-color: #ccc;
        }

        /* PDF按钮 */

        #exportBtn {

            margin-top: 30px;

            background-color: #34c759;
        }

        #exportBtn:hover {

            background-color: #28a745;
        }

        /* 输出区 */

        #output {

            background: var(--card-bg);

            padding: 40px;

            border-radius: 12px;

            box-shadow:
                0 4px 20px rgba(0,0,0,0.05);
        }

        .paragraph-block {

            margin-bottom: 45px;

            /* 防止 PDF 分页时截断 */

            page-break-inside: avoid;

            break-inside: avoid;
        }

        .chinese {

            font-size: 1.15rem;

            margin-bottom: 12px;

            color: #000;

            text-align: justify;

            text-indent: 2em;
        }

        .english {

            color: #666;

            font-size: 1rem;

            line-height: 1.6;

            text-align: justify;

            text-indent: 2em;
        }

        .loading-text {

            color: #bbb;

            font-size: 0.9em;

            font-style: italic;
        }

        /* 打印适配 */

        @media print {

            .input-card,
            #exportBtn,
            h1 {

                display: none;
            }

            body {

                padding: 0;

                background: white;
            }

            #output {

                box-shadow: none;

                padding: 0;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>文章段落双语生成器</h1>

    <!-- 输入区 -->

    <div class="input-card">

        <textarea
            id="articleInput"
            placeholder="在此粘贴你的中文文章（按回车分段）..."
        ></textarea>

        <button
            id="submitBtn"
            onclick="generateParagraphs()"
        >
            提交并按段落排版
        </button>

    </div>

    <!-- 输出区 -->

    <div id="output">

        <div
            style="
                text-align: center;
                color: #ccc;
                padding-top: 20px;
            "
        >
            内容生成区
        </div>

    </div>

    <!-- 导出 PDF 按钮 -->

    <button
        id="exportBtn"
        onclick="exportPDF()"
    >
        导出 PDF 文件
    </button>

</div>

<script>

    // 翻译

    async function translateText(text) {

        if (!text.trim()) return "";

        try {

            const url =
                `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`;

            const response =
                await fetch(url);

            const data =
                await response.json();

            return data[0]
                .map(item => item[0])
                .join('');

        } catch (error) {

            console.error("翻译失败:", error);

            return "Translation error.";
        }
    }

    // 生成段落

    async function generateParagraphs() {

        const input =
            document
            .getElementById('articleInput')
            .value
            .trim();

        const output =
            document
            .getElementById('output');

        const btn =
            document
            .getElementById('submitBtn');

        if (!input) {

            alert("请输入内容");

            return;
        }

        // 初始化

        btn.disabled = true;

        btn.innerText =
            "正在翻译段落...";

        output.innerHTML = '';

        // 按回车切分段落

        const paragraphs =
            input
            .split(/\n+/)
            .map(p => p.trim())
            .filter(p => p.length > 0);

        // 渲染

        for (let pText of paragraphs) {

            const block =
                document.createElement('div');

            block.className =
                'paragraph-block';

            const translationId =
                "p-" +
                Math.random()
                .toString(36)
                .substr(2, 9);

            block.innerHTML = `

                <div class="chinese">
                    ${pText}
                </div>

                <div
                    id="${translationId}"
                    class="english"
                >
                    <span class="loading-text">
                        正在翻译该段落...
                    </span>
                </div>
            `;

            output.appendChild(block);

            // 异步翻译

            translateText(pText)
            .then(translated => {

                const el =
                    document.getElementById(
                        translationId
                    );

                if (el) {

                    el.innerText =
                        translated;
                }
            });
        }

        // 恢复按钮

        btn.disabled = false;

        btn.innerText =
            "提交并按段落排版";
    }

    // 导出 PDF

    async function exportPDF() {

        const input =
            document
            .getElementById('articleInput')
            .value
            .trim();

        if (!input) {

            alert("请先输入文章");

            return;
        }

        // 第一行作为文件名

        const firstLine =
            input
            .split('\n')[0]
            .trim();

        const fileName =
            firstLine || "文章";

        const element =
            document.getElementById('output');

        const exportBtn =
            document.getElementById('exportBtn');

        // 按钮状态

        exportBtn.disabled = true;

        exportBtn.innerText =
            "正在导出 PDF...";

        // PDF 配置

        const opt = {

            margin: [12, 10],

            filename: `${fileName}.pdf`,

            image: {

                type: 'jpeg',

                quality: 0.98
            },

            html2canvas: {

                scale: 2,

                useCORS: true,

                scrollY: 0
            },

            jsPDF: {

                unit: 'mm',

                format: 'a4',

                orientation: 'portrait'
            },

            // 自动分页

            pagebreak: {

                mode: [
                    'avoid-all',
                    'css',
                    'legacy'
                ]
            }
        };

        try {

            await html2pdf()
                .set(opt)
                .from(element)
                .save();

        } catch (err) {

            console.error(err);

            alert("PDF 导出失败");

        } finally {

            exportBtn.disabled = false;

            exportBtn.innerText =
                "导出 PDF 文件";
        }
    }

</script>

</body>
</html>
