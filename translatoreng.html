<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章段落双语生成器</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-chinese: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-chinese);
            line-height: 1.8;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
        }

        .input-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            resize: vertical;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        button {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; }

        #output {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .paragraph-block {
            margin-bottom: 45px; /* 段落间距 */
        }

        .chinese {
            font-size: 1.15rem;
            margin-bottom: 12px;
            color: #000;
            text-align: justify;
            /* 关键修改：首行缩进2个字符 */
            text-indent: 2em; 
        }

        .english {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
            text-align: justify;
            /* 英文翻译通常也保持缩进以对齐排版，
               如果不希望英文缩进，可以将下面这行删除 */
            text-indent: 2em; 
        }

        .loading-text {
            color: #bbb;
            font-size: 0.9em;
            font-style: italic;
        }

        /* 打印适配 */
        @media print {
            .input-card, h1 { display: none; }
            body { padding: 0; background: white; }
            #output { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>文章段落双语生成器</h1>

    <div class="input-card">
        <textarea id="articleInput" placeholder="在此粘贴你的中文文章（按回车分段）..."></textarea>
        <button id="submitBtn" onclick="generateParagraphs()">提交并按段落排版</button>
    </div>

    <div id="output">
        <div style="text-align: center; color: #ccc; padding-top: 20px;">内容生成区</div>
    </div>
</div>

<script>
    async function translateText(text) {
        if (!text.trim()) return "";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            return data[0].map(item => item[0]).join('');
        } catch (error) {
            console.error("翻译失败:", error);
            return "Translation error.";
        }
    }

    async function generateParagraphs() {
        const input = document.getElementById('articleInput').value.trim();
        const output = document.getElementById('output');
        const btn = document.getElementById('submitBtn');
        
        if (!input) {
            alert("请输入内容");
            return;
        }

        btn.disabled = true;
        btn.innerText = "正在翻译段落...";
        output.innerHTML = ''; 

        // 识别换行符进行切分
        const paragraphs = input.split(/\n+/).map(p => p.trim()).filter(p => p.length > 0);

        for (let pText of paragraphs) {
            const block = document.createElement('div');
            block.className = 'paragraph-block';
            const translationId = "p-" + Math.random().toString(36).substr(2, 9);
            
            block.innerHTML = `
                <div class="chinese">${pText}</div>
                <div id="${translationId}" class="english"><span class="loading-text">正在翻译该段落...</span></div>
            `;
            output.appendChild(block);

            translateText(pText).then(translated => {
                const el = document.getElementById(translationId);
                if (el) el.innerText = translated;
            });
        }

        btn.disabled = false;
        btn.innerText = "提交并按段落排版";
    }
</script>

</body>
</html>
